name: "네이버 블로그 부스팅 캠페인"
description: "Supabase 페르소나를 활용한 자연스러운 블로그 트래픽 생성"
version: "1.0"

config:
  device_serial: "R3CW60BHSAT"
  cdp_port: 9333
  base_url: "https://m.blog.naver.com/tlswkehd_/224174022465"
  referrer_base: "https://m.search.naver.com/search.naver?where=m_blog&query="
  keywords:
    - "cctv 설치 비용"
    - "사무실 cctv"
    - "매장 cctv 추천"
    - "cctv 월 비용"
    - "소상공인 cctv"
    - "가게 cctv 가격"
    - "cctv 렌탈"
    - "kt cctv"
    - "cctv 업체 추천"
    - "소규모 매장 cctv"

  # Supabase (페르소나)
  supabase_url: "https://pkehcfbjotctvneordob.supabase.co"
  # service_key는 환경변수에서 읽음

  # Chrome 패키지
  chrome_package: "com.android.chrome"
  chrome_data_dir: "/data/data/com.android.chrome/app_chrome/Default"

  # 체류시간 범위 (초)
  min_dwell: 60
  max_dwell: 180

  # 방문 간 쿨다운 (초)
  min_visit_gap: 15
  max_visit_gap: 35

  # 분산 모드 시간
  spread_start_hour: 7
  spread_end_hour: 23
  spread_min_gap: 120  # 2분
  spread_max_gap: 900  # 15분

# 파이프라인 정의
pipelines:
  # 1단계: 세션 준비
  - name: "prepare_session"
    actions:
      - "persona_selector"
      - "cookie_cleaner"
      - "ip_rotator"
    parallel: false
    break_on_failure: true
    max_retries: 1

  # 2단계: 신원 설정
  - name: "identity_setup"
    actions:
      - "android_id_setter"
    parallel: false
    break_on_failure: true
    max_retries: 2

  # 3단계: 네비게이션
  - name: "navigation"
    actions:
      - "cdp_navigator"
    parallel: false
    break_on_failure: true
    max_retries: 2

  # 4단계: 상호작용
  - name: "interaction"
    actions:
      - "dwell_simulator"
    parallel: false
    break_on_failure: false
    max_retries: 1

  # 5단계: 로깅
  - name: "logging"
    actions:
      - "supabase_logger"
    parallel: false
    break_on_failure: false  # 로깅 실패해도 캠페인 성공으로 간주
    max_retries: 1

# 액션별 설정
action_configs:
  persona_selector:
    max_retries: 10

  cookie_cleaner:
    chrome_package: "com.android.chrome"
    chrome_data_dir: "/data/data/com.android.chrome/app_chrome/Default"

  ip_rotator:
    disable_wait: 2
    enable_wait: 5

  android_id_setter:
    chrome_package: "com.android.chrome"

  cdp_navigator:
    chrome_package: "com.android.chrome"
    wait_load: 5
    set_geolocation: true

  dwell_simulator:
    min_dwell: 60
    max_dwell: 180

# 시간대별 트래픽 가중치
hourly_weights:
  7: 0.5
  8: 0.7
  9: 1.0
  10: 1.2
  11: 1.3
  12: 1.5
  13: 1.3
  14: 1.0
  15: 0.9
  16: 0.9
  17: 1.1
  18: 1.3
  19: 1.5
  20: 1.4
  21: 1.2
  22: 0.7

# 캠페인 일정 (자동 모드)
schedule:
  start_date: "2026-02-06"
  daily_base: 50
  growth_rate: 1.23
