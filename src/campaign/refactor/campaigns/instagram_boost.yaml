name: "Instagram Referer 블로그 부스팅 캠페인"
description: "인스타그램 유입 트래픽 재현 - l.instagram.com 리퍼러로 블로그 방문"
version: "1.0"

config:
  device_serial: "R54X90407HB"
  cdp_port: 9334

  # === Instagram 캠페인 핵심 변경점 ===
  # referrer_mode: fixed (검색 키워드 조합 아닌 고정 리퍼러)
  referrer_mode: "fixed"
  referrer_fixed: "https://l.instagram.com/"

  # 타겟 블로그 (모바일 버전 필수)
  target_urls:
    - "https://m.blog.naver.com/tidtyd222"     # 분유타는대표 블로그 홈
    - "https://m.blog.naver.com/wngmlxx12"      # 민지 블로그 홈

  # 기존 호환용 (run_single_visit fallback)
  base_url: "https://m.blog.naver.com/tidtyd222"
  referrer_base: "https://l.instagram.com/"
  keywords:
    - ""  # Instagram 캠페인은 키워드 불필요

  # sec-fetch 헤더 (Instagram 인앱 브라우저 패턴)
  sec_fetch_headers:
    sec-fetch-site: "cross-site"
    sec-fetch-mode: "navigate"
    sec-fetch-dest: "document"

  # Instagram 인앱 브라우저 UA 오버라이드
  instagram_ua: true
  instagram_ua_template: >-
    Mozilla/5.0 (Linux; Android {os_ver}; {model} Build/{build_id}; wv)
    AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0
    Chrome/{chrome_ver} Mobile Safari/537.36
    Instagram {insta_ver} Android ({android_ver}/{api_level};
    {dpi}dpi; {width}x{height}; {manufacturer}; {model};
    {codename}; {cpu_abi}; ko_KR; {app_id})

  # Instagram 앱 버전 풀
  insta_versions:
    - "375.0.0.38.112"
    - "374.1.0.39.108"
    - "373.0.0.36.107"

  # Supabase
  supabase_url: "https://pkehcfbjotctvneordob.supabase.co"

  # Chrome 패키지
  chrome_package: "com.android.chrome"
  chrome_data_dir: "/data/data/com.android.chrome/app_chrome/Default"

  # 체류시간 (초) — Instagram 유입은 좀 더 짧게
  min_dwell: 45
  max_dwell: 150

  # 방문 간 쿨다운 (초)
  min_visit_gap: 20
  max_visit_gap: 45

  # 분산 모드
  spread_start_hour: 7
  spread_end_hour: 23
  spread_min_gap: 120
  spread_max_gap: 900

# 파이프라인 (기존과 동일 구조)
pipelines:
  - name: "prepare_session"
    actions:
      - "persona_selector"
      - "cookie_cleaner"
      - "ip_rotator"
    parallel: false
    break_on_failure: true
    max_retries: 1

  - name: "identity_setup"
    actions:
      - "android_id_setter"
    parallel: false
    break_on_failure: true
    max_retries: 2

  - name: "navigation"
    actions:
      - "cdp_navigator"
    parallel: false
    break_on_failure: true
    max_retries: 2

  - name: "interaction"
    actions:
      - "dwell_simulator"
    parallel: false
    break_on_failure: false
    max_retries: 1

  - name: "logging"
    actions:
      - "supabase_logger"
    parallel: false
    break_on_failure: false
    max_retries: 1

# 액션별 설정
action_configs:
  persona_selector:
    max_retries: 10

  cookie_cleaner:
    chrome_package: "com.android.chrome"
    chrome_data_dir: "/data/data/com.android.chrome/app_chrome/Default"

  ip_rotator:
    disable_wait: 2
    enable_wait: 5

  android_id_setter:
    chrome_package: "com.android.chrome"

  cdp_navigator:
    chrome_package: "com.android.chrome"
    wait_load: 5
    set_geolocation: true
    # Instagram 전용: sec-fetch 헤더 + UA 오버라이드
    set_sec_fetch_headers: true
    set_instagram_ua: true

  dwell_simulator:
    min_dwell: 45
    max_dwell: 150

# 시간대별 가중치 (저녁 > 낮, 주말 패턴)
hourly_weights:
  7: 0.3
  8: 0.5
  9: 0.7
  10: 0.8
  11: 0.9
  12: 1.0
  13: 0.9
  14: 0.8
  15: 0.7
  16: 0.8
  17: 1.0
  18: 1.3
  19: 1.5
  20: 1.6
  21: 1.4
  22: 1.0

# 캠페인 일정
schedule:
  start_date: "2026-02-10"
  daily_base: 15        # Instagram 유입은 보수적으로 시작
  growth_rate: 1.15     # 주간 15% 증가 (자연 성장 커브 모방)
