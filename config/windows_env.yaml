# Windows 환경 설정
environment: windows
version: "1.0.0"

# Python 설정
python:
  version: "3.11"
  venv_path: "venv"
  
# ADB 설정
adb:
  path: "C:\\ProgramData\\chocolatey\\bin\\adb.exe"
  port: 5038  # 기본 5037은 Tailscale이 사용 중
  default_timeout: 30000
  max_devices: 10
  
# 에뮬레이터 설정
emulator:
  type: "genymotion"  # genymotion, android_studio, bluestacks
  base_port: 5554
  max_instances: 5
  
# GUI 자동화
gui:
  screenshot_interval: 1.0
  click_delay_min: 0.1
  click_delay_max: 0.3
  
# 로깅
logging:
  level: "INFO"
  file: "data/logs/windows.log"
  max_size_mb: 100
  backup_count: 5

# WSL 통신
wsl_integration:
  enabled: true
  shared_dir: "C:\\ai-projects\\shared"
  message_queue_dir: "C:\\ai-projects\\shared\\message_queues"
  websocket_port: 8765
